apis:
  - aid: domestika:domestika-api
    name: Domestika API
    description: >
      The Domestika REST API at api.domestika.org is the internal backbone of
      the Domestika platform, providing access to course catalog listings,
      learner enrollment records, user profiles, community content, and media
      assets. The API uses token-based authentication and powers the main
      domestika.org web application as well as iOS and Android mobile clients.
      Business customers can use API capabilities through the Domestika for
      Business management dashboard to manage team seat assignments and track
      learner progress across their organization.
    humanURL: https://www.domestika.org
