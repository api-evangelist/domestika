aid: domestika
name: Domestika
description: >
  Domestika is an online creative education platform that connects over 8 million
  creative professionals and learners with high-quality courses across illustration,
  design, photography, marketing, and more. The platform provides a REST API at
  api.domestika.org that powers its web and mobile applications, exposing course
  catalog data, user enrollment information, and community features. Domestika for
  Business extends the platform to organizations, enabling teams to purchase seat
  licenses and track learner progress through a management dashboard. Creative
  professionals and businesses can leverage Domestika's catalog and learner data
  to integrate creative skills development into their workflows and tooling.
